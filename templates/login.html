{% extends "base.html" %}
{% block title %}Login - Sistem Manajemen Kelas{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>Sistem Manajemen Kelas</h1>
            <p>Masukkan NIM dan Password untuk melanjutkan</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="nim">NIM</label>
                <input type="text" id="nim" name="nim" required placeholder="Masukkan NIM" autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Masukkan Password">
            </div>

            <button type="submit" class="btn-submit">Masuk</button>
        </form>

        <div class="login-footer">
            <p class="status-info">Login mahasiswa hanya tersedia jika datasheet Anda sedang aktif.</p>
        </div>
    </div>
</div>
{% endblock %}
