{% extends "base.html" %}
{% block title %}Ubah Password{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1 style="color:#2563EB;">Keamanan Akun</h1>
            <p>Anda harus mengubah password default sebelum melanjutkan.</p>
        </div>

        <form method="POST" action="{{ url_for('change_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="old_password">Password Lama</label>
                <input type="password" id="old_password" name="old_password" required placeholder="Password saat ini">
            </div>

            <div class="form-group">
                <label for="new_password">Password Baru</label>
                <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="Minimal 6 karakter">
            </div>

            <div class="form-group">
                <label for="confirm_password">Konfirmasi Password Baru</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Ulangi password baru">
            </div>

            <button type="submit" class="btn-submit">Ubah Password</button>
        </form>

        <div class="login-footer">
            <p class="status-info">Password baru minimal 6 karakter. Gunakan kombinasi huruf dan angka untuk keamanan lebih baik.</p>
        </div>
    </div>
</div>
{% endblock %}
